<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 980" font-family="-apple-system,'PingFang SC','Microsoft YaHei',Segoe UI,Helvetica,Arial,sans-serif">
  <defs>
    <style>
      .title{font-size:22px;font-weight:700;fill:#1a3b8b;}
      .layer{font-size:16px;font-weight:600;fill:#334155;}
      .cardT{font-size:18px;font-weight:700;}
      .cardS{font-size:13px;}
      .flowT{font-size:16px;font-weight:700;fill:#7a2540;}
      .flowS{font-size:13px;fill:#9d4a63;}
      .closeT{font-size:17px;font-weight:700;fill:#356a2a;}
    </style>
  </defs>

  <!-- Outer container -->
  <rect x="20" y="20" width="1040" height="940" rx="18" fill="#e8f0fb" stroke="#a9c4ee" stroke-width="1.5"/>
  <text class="title" x="56" y="66">EdgeOne Makers（同项目部署 · 全球边缘 · 内置模型 50万 token/月）</text>

  <!-- Layer 1 -->
  <text class="layer" x="56" y="112">① 应用层 · 前端页面 + 对话入口</text>
  <g>
    <rect x="56" y="126" width="300" height="88" rx="12" fill="#f0eefc" stroke="#c9bef0" stroke-width="1.5"/>
    <text class="cardT" x="206" y="164" text-anchor="middle" fill="#4a2f9e">选题 Dashboard</text>
    <text class="cardS" x="206" y="188" text-anchor="middle" fill="#6b5ca8">命中率趋势 / 评分</text>

    <rect x="390" y="126" width="300" height="88" rx="12" fill="#f0eefc" stroke="#c9bef0" stroke-width="1.5"/>
    <text class="cardT" x="540" y="164" text-anchor="middle" fill="#4a2f9e">每日选题简报</text>
    <text class="cardS" x="540" y="188" text-anchor="middle" fill="#6b5ca8">3 选题 + 拟标题</text>

    <rect x="724" y="126" width="300" height="88" rx="12" fill="#f0eefc" stroke="#c9bef0" stroke-width="1.5"/>
    <text class="cardT" x="874" y="164" text-anchor="middle" fill="#4a2f9e">多平台成稿页</text>
    <text class="cardS" x="874" y="188" text-anchor="middle" fill="#6b5ca8">一稿 N 版适配</text>
  </g>

  <!-- Layer 2 -->
  <text class="layer" x="56" y="262">② 智能层 · WorkBuddy Expert + Skills（可复用核心资产）</text>
  <g>
    <rect x="56" y="276" width="300" height="88" rx="12" fill="#e6f6ec" stroke="#a9dcbb" stroke-width="1.5"/>
    <text class="cardT" x="206" y="314" text-anchor="middle" fill="#1f7a45">Expert 选题评分官</text>
    <text class="cardS" x="206" y="338" text-anchor="middle" fill="#3c8f60">打分 + 给理由</text>

    <rect x="390" y="276" width="300" height="88" rx="12" fill="#e6f6ec" stroke="#a9dcbb" stroke-width="1.5"/>
    <text class="cardT" x="540" y="314" text-anchor="middle" fill="#1f7a45">Skill 选题雷达</text>
    <text class="cardS" x="540" y="338" text-anchor="middle" fill="#3c8f60">热点抓取 + 归纳</text>

    <rect x="724" y="276" width="300" height="88" rx="12" fill="#e6f6ec" stroke="#a9dcbb" stroke-width="1.5"/>
    <text class="cardT" x="874" y="314" text-anchor="middle" fill="#1f7a45">Skill 多平台改写</text>
    <text class="cardS" x="874" y="338" text-anchor="middle" fill="#3c8f60">语气 / 长度 / 标签</text>
  </g>

  <!-- Layer 3 -->
  <text class="layer" x="56" y="412">③ 数据层 · Serverless API (Functions) + Edge KV</text>
  <g>
    <rect x="56" y="426" width="468" height="88" rx="12" fill="#fbf3dc" stroke="#e6d19a" stroke-width="1.5"/>
    <text class="cardT" x="290" y="464" text-anchor="middle" fill="#8a6a1a">Functions：数据回流 API</text>
    <text class="cardS" x="290" y="488" text-anchor="middle" fill="#a9862f">录入发布结果 / 互动数据</text>

    <rect x="556" y="426" width="468" height="88" rx="12" fill="#fbf3dc" stroke="#e6d19a" stroke-width="1.5"/>
    <text class="cardT" x="790" y="464" text-anchor="middle" fill="#8a6a1a">Edge KV：选题历史库</text>
    <text class="cardS" x="790" y="488" text-anchor="middle" fill="#a9862f">选题 / 标题 / 时间 / 互动</text>
  </g>

  <!-- Layer 4 -->
  <text class="layer" x="56" y="562">④ 自动化 · WorkBuddy Automation（定时驱动闭环）</text>
  <g>
    <rect x="56" y="576" width="968" height="96" rx="12" fill="#fbe9ef" stroke="#eec1d0" stroke-width="1.5"/>
    <text class="flowT" x="540" y="618" text-anchor="middle">每日：抓热点 → 评分 → 推简报　　|　　每周：回流数据 → 生成命中率复盘周报</text>
    <text class="flowS" x="540" y="646" text-anchor="middle">让系统自己转起来，评审看到的是"活的系统"</text>
  </g>

  <!-- Connector -->
  <line x1="540" y1="672" x2="540" y2="724" stroke="#94a3b8" stroke-width="2"/>

  <!-- Closed loop -->
  <rect x="270" y="724" width="540" height="88" rx="12" fill="#e6f6ec" stroke="#a9dcbb" stroke-width="1.5"/>
  <text class="closeT" x="540" y="776" text-anchor="middle">闭环：数据越用越准 → 选题命中率持续上升（可量化）</text>
</svg>
